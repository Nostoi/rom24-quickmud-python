# Activate per clone with:  pip install pre-commit && pre-commit install
# ruff is the single source of truth for both lint and format (see
# pyproject.toml [tool.ruff] / [tool.ruff.format]); black was removed to avoid
# formatter drift with `ruff format`, which the repo is now formatted against.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.12
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
  - repo: local
    hooks:
      # NOTE: test-fixtures-lint is `stages: [manual]` — it fails on the existing
      # codebase (~617 legacy test sites predate the standard fixtures) and with
      # `pass_filenames: false` it can't grandfather legacy. It's a style/
      # consistency lint, not correctness. Run on demand:
      # `pre-commit run --hook-stage manual test-fixtures-lint --all-files`.
      # Move it back to the commit stage once the legacy tests are migrated (or
      # rework it to lint only changed files).
      - id: test-fixtures-lint
        name: Ensure tests use standard fixtures
        entry: python3 scripts/lint_test_fixtures.py
        language: system
        files: ^tests/.*\.py$
        pass_filenames: false
        stages: [manual]
      # validate-area-parity is back on the commit stage: its comparison was
      # fixed to validate conversion fidelity (raw .are loader vs raw JSON
      # resets) instead of comparing two loaders with different runtime
      # normalizations (the prior ~34 "errors" were D-reset boot-consumption +
      # the canyon M-arg4 0→1 loader rewrite, not real divergences). Now reports
      # perfect parity across all 50 shipped areas.
      - id: validate-area-parity
        name: Validate ROM .are and JSON area file parity
        entry: python3 scripts/validation/validate_area_parity.py
        language: system
        pass_filenames: false
        files: ^(area/.*\.are|data/areas/.*\.json)$
      - id: equipment-key-convention
        name: Equipment dict must be int(WearLocation)-keyed (no string slot keys)
        entry: python3 -m pytest tests/test_equipment_key_convention.py -q
        language: system
        pass_filenames: false
        files: ^mud/.*\.py$
      - id: attribute-convention
        name: Use char.inventory / room.people (not .carrying / .characters)
        entry: python3 -m pytest tests/test_attribute_convention.py -q
        language: system
        pass_filenames: false
        files: ^mud/.*\.py$
